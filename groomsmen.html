<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groomsmen | Michele & Joseph</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf7f2;
    --warm-white: #fff8f0;
    --gold: #b89a5e;
    --gold-light: #d4b97a;
    --gold-muted: #e8d9b5;
    --rose: #c4907a;
    --dark: #2c2416;
    --mid: #6b5c44;
    --light-text: #9c8870;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); font-family: 'Jost', sans-serif; color: var(--dark); min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(250,247,242,0.97); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(184,154,94,0.2); padding: 0 24px; }
  nav ul { display: flex; list-style: none; justify-content: center; gap: 0; max-width: 1000px; margin: 0 auto; flex-wrap: wrap; }
  nav a { display: block; padding: 18px 18px; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color 0.2s; border-bottom: 2px solid transparent; white-space: nowrap; }
  nav a:hover, nav a.active { color: var(--gold); border-bottom-color: var(--gold); }
  .nav-divider { width: 1px; background: var(--gold-muted); margin: 12px 0; align-self: stretch; }

  /* HERO */
  .hero { min-height: 60vh; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 60px 24px; }
  .hero-bg { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184,154,94,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 50% at 100% 100%, rgba(196,144,122,0.06) 0%, transparent 50%); }
  .hero-tag { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); opacity: 0.8; margin-bottom: 20px; }
  .hero-names { font-family: 'Cormorant Garamond', serif; font-size: clamp(48px, 12vw, 90px); font-weight: 300; color: var(--warm-white); line-height: 0.9; text-align: center; }
  .hero-names .amp { font-style: italic; color: var(--gold-light); display: block; font-size: 0.65em; }
  .hero-divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 28px auto; }
  .hero-sub { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: var(--light-text); text-align: center; line-height: 2; }
  .hero-page-label { margin-top: 20px; font-size: 11px; letter-spacing: 5px; text-transform: uppercase; color: var(--rose); opacity: 0.9; }

  /* SECTIONS */
  .section-wrap { padding: 80px 24px; max-width: 860px; margin: 0 auto; }
  .section-wrap-alt { padding: 80px 24px; background: var(--warm-white); }
  .section-wrap-alt .inner { max-width: 860px; margin: 0 auto; }
  .section-tag { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(34px, 6vw, 50px); font-weight: 300; color: var(--dark); margin-bottom: 40px; line-height: 1.1; }
  .section-title em { font-style: italic; color: var(--rose); }
  .section-divider { width: 60px; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); margin-bottom: 40px; }

  /* PARTY GRID */
  .party-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 32px 24px; }
  .party-card { text-align: center; }
  .party-photo { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--gold-muted); background: var(--gold-muted); margin: 0 auto 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .party-photo img { width: 100%; height: 100%; object-fit: cover; }
  .party-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--dark); margin-bottom: 2px; }
  .party-role { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .party-relation { font-size: 12px; color: var(--light-text); font-style: italic; }
  .party-group-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--mid); margin: 48px 0 24px; padding-bottom: 10px; border-bottom: 1px solid var(--gold-muted); }

  /* TIMELINE */
  .day-block { margin-bottom: 56px; }
  .day-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .day-date-box { background: var(--dark); color: var(--gold); padding: 14px 20px; text-align: center; min-width: 70px; flex-shrink: 0; }
  .day-date-box.gold { background: var(--gold); color: var(--dark); }
  .day-date-box .month { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
  .day-date-box .num { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; line-height: 1; }
  .day-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--dark); }
  .day-name span { display: block; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--light-text); margin-top: 2px; }
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 1px; background: linear-gradient(to bottom, var(--gold-muted), transparent); }
  .timeline-item { position: relative; margin-bottom: 28px; }
  .timeline-item::before { content: ''; position: absolute; left: -32px; top: 6px; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }
  .timeline-time { font-size: 11px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
  .timeline-event { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--dark); margin-bottom: 4px; }
  .timeline-location { font-size: 13px; color: var(--light-text); margin-bottom: 6px; }
  .timeline-notes { font-size: 14px; color: var(--mid); line-height: 1.6; padding: 12px 16px; background: var(--warm-white); border-left: 2px solid var(--gold-muted); margin-top: 8px; }
  .timeline-notes strong { color: var(--rose); }

  /* ATTIRE */
  .attire-grid { display: grid; gap: 20px; }
  .attire-item { display: grid; grid-template-columns: 28px 1fr; gap: 16px; align-items: start; padding: 24px; background: var(--cream); border: 1px solid var(--gold-muted); }
  .attire-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .attire-text { font-size: 15px; color: var(--mid); line-height: 1.6; }
  .attire-note { font-size: 13px; color: var(--rose); margin-top: 4px; font-style: italic; }

  /* PAIRINGS */
  .pairings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .pairing-card { display: flex; align-items: center; gap: 16px; padding: 20px; background: var(--cream); border: 1px solid var(--gold-muted); }
  .pairing-num { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--gold-muted); font-weight: 300; flex-shrink: 0; line-height: 1; }
  .pairing-names { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--dark); line-height: 1.3; }
  .pairing-names .amp { color: var(--gold); font-style: italic; }

  /* BRING LIST */
  .bring-list { list-style: none; display: grid; gap: 12px; }
  .bring-list li { display: flex; align-items: baseline; gap: 12px; font-size: 15px; color: var(--mid); line-height: 1.5; padding: 14px 20px; background: var(--cream); border: 1px solid var(--gold-muted); }
  .bring-list li::before { content: '✦'; color: var(--gold); font-size: 10px; flex-shrink: 0; }

  /* REMINDERS */
  .reminders-box { border: 1px solid var(--gold-muted); padding: 32px; background: var(--cream); }
  .reminders-header { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .reminders-artist { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--dark); margin-bottom: 24px; }
  .reminder-list { list-style: none; }
  .reminder-list li { font-size: 14px; color: var(--mid); line-height: 1.7; padding: 8px 0 8px 20px; border-bottom: 1px solid var(--gold-muted); position: relative; }
  .reminder-list li:last-child { border-bottom: none; }
  .reminder-list li::before { content: '—'; position: absolute; left: 0; color: var(--gold); }

  /* FOOTER */
  footer { background: var(--dark); color: var(--light-text); text-align: center; padding: 48px 24px; }
  .footer-names { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--warm-white); margin-bottom: 8px; }
  .footer-names em { font-style: italic; color: var(--gold-light); }
  footer p { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .fade { animation: fadeUp 0.8s ease both; }

  @media (max-width: 600px) {
    nav a { padding: 14px 10px; font-size: 9px; letter-spacing: 2px; }
    .party-grid { grid-template-columns: repeat(2, 1fr); }
    .pairings-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
